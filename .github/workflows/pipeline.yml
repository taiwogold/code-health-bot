name: Code Health Bot CI

on:
  push:
    branches: ["main"]

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"

    - name: Run Code Health Bot
      run: python scanner.py
      
    - name: Run Code Health Bot
      run: |
        mkdir -p reports
        python scanner.py
